# Conservative memory for 15GB RAM; avoid daemon to prevent native memory address-space exhaustion
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=192m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
org.gradle.daemon=false
org.gradle.parallel=true
org.gradle.workers.max=2